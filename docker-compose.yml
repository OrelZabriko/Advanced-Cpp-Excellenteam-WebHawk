version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: webhawk_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    restart: always
     # depends_on alone only orders startup - it does not wait for Postgres to
    # accept connections. Without this healthcheck the other services race the
    # database on a cold start and fail their first queries.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  security_engine:
    build:
      context: .
      dockerfile: Dockerfile-security
    container_name: webhawk_security
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Overrides DB_HOST from .env - inside Docker, "postgres" is the
      # service name above, resolved automatically by Docker's internal DNS.
      - DB_HOST=postgres

  users:
    build:
      context: .
      dockerfile: Dockerfile-users
    container_name: webhawk_users
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=postgres

  backend_registry:
    build:
      context: .
      dockerfile: Dockerfile-backend-registry
    container_name: webhawk_backend_registry
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=postgres

  middleware:
    build:
      context: .
      dockerfile: Dockerfile-middleware
    container_name: webhawk_middleware
    # The ONLY service reachable from outside Docker - the project's single
    # public entry point. Everything else is internal-only (see above).
    ports:
      - "8080:8080"
    depends_on:
      - security_engine
      - users
      - backend_registry
    env_file:
      - .env