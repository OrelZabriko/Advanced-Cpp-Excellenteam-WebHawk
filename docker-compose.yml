version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: webhawk_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    restart: always

  security_engine:
    build:
      context: .
      dockerfile: Dockerfile-security
    container_name: webhawk_security
    # No external "ports:" - reachable only from inside the Docker network
    # (i.e. only by the middleware, once it exists), matching the final
    # architecture: the middleware is the project's single public entry point.
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      # Overrides DB_HOST from .env - inside Docker, "postgres" is the
      # service name above, resolved automatically by Docker's internal DNS.
      - DB_HOST=postgres

  users:
    build:
      context: .
      dockerfile: Dockerfile-users
    container_name: webhawk_users
    # No external "ports:" - same reasoning as security_engine above.
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DB_HOST=postgres

  backend-registry:
    build:
      context: .
      dockerfile: Dockerfile-backend-registry
    container_name: webhawk_backend_registry
    # No external "ports:" - same reasoning as security_engine/users above.
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DB_HOST=postgres

  middleware:
    build:
      context: .
      dockerfile: Dockerfile-middleware
    container_name: webhawk_middleware
    # The ONLY service reachable from outside Docker - the project's single
    # public entry point. Everything else is internal-only (see above).
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - security_engine
      - users
      - backend-registry
    env_file:
      - .env